<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mini Weather Dashboard</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: linear-gradient(to right, #74ebd5, #acb6e5);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .card {
        background: white;
        padding: 30px;
        border-radius: 12px;
        width: 320px;
        text-align: center;
        box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
      }

      h2 {
        margin-bottom: 15px;
      }

      input {
        padding: 8px;
        width: 65%;
        border-radius: 5px;
        border: 1px solid #ccc;
      }

      button {
        padding: 8px 12px;
        border: none;
        border-radius: 5px;
        background: #007bff;
        color: white;
        cursor: pointer;
      }

      button:hover {
        background: #0056b3;
      }

      .weather-display {
        margin-top: 20px;
        padding: 15px;
        border-radius: 8px;
        background: #f4f4f4;
      }

      .icon {
        font-size: 40px;
        margin-bottom: 10px;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h2>🌤 Weather Today</h2>

      <input type="text" id="cityInput" placeholder="Enter city" />
      <button onclick="checkWeather()">Check Weather</button>

      <div class="weather-display" id="weatherBox">
        <p>Enter a city to see weather.</p>
      </div>
    </div>

    <script>
      function checkWeather() {
        let city = document.getElementById("cityInput").value;
        let weatherBox = document.getElementById("weatherBox");

        if (city === "") {
          alert("Please enter a city");
          return;
        }

        // Mock weather data
        let weatherTypes = [
          { type: "Sunny", temp: 22, icon: "☀️" },
          { type: "Rainy", temp: 18, icon: "🌧" },
          { type: "Cloudy", temp: 20, icon: "☁️" },
        ];

        // Random weather selection
        let weather =
          weatherTypes[Math.floor(Math.random() * weatherTypes.length)];

        weatherBox.innerHTML = `
        <div class="icon">${weather.icon}</div>
        <p><b>City:</b> ${city}</p>
        <p><b>Temp:</b> ${weather.temp}°C</p>
        <p><b>Weather:</b> ${weather.type}</p>
    `;

        // Change background depending on weather
        if (weather.type === "Sunny") {
          document.body.style.background = "#FFD54F";
        } else if (weather.type === "Rainy") {
          document.body.style.background = "#64B5F6";
        } else {
          document.body.style.background = "#B0BEC5";
        }
      }
    </script>
  </body>
</html>
