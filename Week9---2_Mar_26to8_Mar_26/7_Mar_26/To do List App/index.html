<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>To-Do List App</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f2f2f2;
        text-align: center;
        padding-top: 50px;
      }

      .container {
        width: 400px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      }

      input {
        width: 65%;
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }

      button {
        padding: 10px 15px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin: 5px;
      }

      .addBtn {
        background: #28a745;
        color: white;
      }

      .resetBtn {
        background: #dc3545;
        color: white;
      }

      ul {
        list-style: none;
        padding: 0;
        margin-top: 20px;
      }

      li {
        padding: 10px;
        margin: 5px 0;
        border: 1px solid #ddd;
        border-radius: 5px;
        text-align: left;
        cursor: pointer;
        transition: 0.3s;
      }

      li:hover {
        background: #f9f9f9;
      }

      .done {
        text-decoration: line-through;
        color: gray;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>My To-Do List</h2>

      <input type="text" id="taskInput" placeholder="Enter a task..." />
      <button class="addBtn" onclick="addTask()">Add</button>
      <button class="resetBtn" onclick="clearTasks()">Clear All</button>

      <ul id="taskList"></ul>
    </div>

    <script>
      function addTask() {
        let input = document.getElementById("taskInput");
        let taskText = input.value.trim();

        if (taskText === "") {
          alert("Please enter a task");
          return;
        }

        let li = document.createElement("li");
        li.textContent = taskText;

        li.onclick = function () {
          li.classList.toggle("done");
        };

        document.getElementById("taskList").appendChild(li);
        input.value = "";
      }

      function clearTasks() {
        document.getElementById("taskList").innerHTML = "";
      }
    </script>
  </body>
</html>
