<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login & Registration Form</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
        padding: 20px;
      }

      .container {
        display: flex;
        gap: 30px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .form-card {
        background: white;
        padding: 30px 25px;
        width: 320px;
        border-radius: 16px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        transition: transform 0.3s ease;
      }

      .form-card:hover {
        transform: translateY(-5px);
      }

      .form-card h2 {
        text-align: center;
        margin-bottom: 20px;
        color: #333;
      }

      .form-group {
        margin-bottom: 15px;
        display: flex;
        flex-direction: column;
      }

      label {
        margin-bottom: 6px;
        font-size: 0.9rem;
        font-weight: bold;
        color: #555;
      }

      input {
        padding: 10px 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 0.95rem;
        transition:
          border 0.3s ease,
          box-shadow 0.3s ease;
      }

      input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
      }

      button {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        background: #667eea;
        color: white;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s ease;
        margin-top: 10px;
      }

      button:hover {
        background: #5a67d8;
      }

      .switch-text {
        text-align: center;
        font-size: 0.85rem;
        margin-top: 12px;
        color: #666;
      }

      .switch-text a {
        color: #667eea;
        text-decoration: none;
        font-weight: bold;
      }

      @media (max-width: 700px) {
        .container {
          flex-direction: column;
          align-items: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Login Form -->
      <div class="form-card">
        <h2>Login</h2>
        <form>
          <div class="form-group">
            <label for="login-username">Username</label>
            <input
              type="text"
              id="login-username"
              name="username"
              placeholder="Enter your username"
              required
            />
          </div>

          <div class="form-group">
            <label for="login-password">Password</label>
            <input
              type="password"
              id="login-password"
              name="password"
              placeholder="Enter your password"
              required
            />
          </div>

          <button type="submit">Login</button>
        </form>
        <div class="switch-text">
          Don't have an account? <a href="#">Register</a>
        </div>
      </div>

      <!-- Registration Form -->
      <div class="form-card">
        <h2>Register</h2>
        <form>
          <div class="form-group">
            <label for="reg-username">Username</label>
            <input
              type="text"
              id="reg-username"
              name="username"
              placeholder="Choose a username"
              required
            />
          </div>

          <div class="form-group">
            <label for="reg-email">Email</label>
            <input
              type="email"
              id="reg-email"
              name="email"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="form-group">
            <label for="reg-password">Password</label>
            <input
              type="password"
              id="reg-password"
              name="password"
              placeholder="Create a password"
              required
            />
          </div>

          <button type="submit">Register</button>
        </form>
        <div class="switch-text">
          Already have an account? <a href="#">Login</a>
        </div>
      </div>
    </div>
  </body>
</html>
