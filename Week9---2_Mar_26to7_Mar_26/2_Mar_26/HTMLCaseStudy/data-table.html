<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Styled Data Table</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #f5f7fb;
        padding: 40px 20px;
        color: #333;
      }

      h1 {
        text-align: center;
        margin-bottom: 20px;
      }

      /* Table Styling */
      .table-container {
        max-width: 900px;
        margin: auto;
        overflow-x: auto;
      }

      table {
        width: 100%;
        border-collapse: collapse; /* Important task */
        background: white;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
      }

      caption {
        caption-side: top;
        font-size: 1.4rem;
        font-weight: bold;
        padding: 12px;
      }

      th,
      td {
        padding: 12px 14px;
        text-align: left;
        border-bottom: 1px solid #e5e7eb;
      }

      th {
        background: #111827;
        color: white;
      }

      /* Alternate row colors */
      tbody tr:nth-child(even) {
        background: #f3f4f6;
      }

      /* Hover effect */
      tbody tr:hover {
        background: #dbeafe;
        transition: background 0.2s ease;
      }

      /* Responsive */
      @media (max-width: 600px) {
        th,
        td {
          padding: 10px;
          font-size: 0.9rem;
        }
      }
    </style>
  </head>
  <body>
    <h1>Student Grades Table</h1>

    <div class="table-container">
      <table>
        <caption>
          Class Performance Report
        </caption>
        <thead>
          <tr>
            <th>Student Name</th>
            <th>Subject</th>
            <th>Marks</th>
            <th>Grade</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Mahesh</td>
            <td>Mathematics</td>
            <td>92</td>
            <td>A+</td>
          </tr>
          <tr>
            <td>Parth</td>
            <td>Science</td>
            <td>85</td>
            <td>A</td>
          </tr>
          <tr>
            <td>Aman</td>
            <td>English</td>
            <td>78</td>
            <td>B+</td>
          </tr>
          <tr>
            <td>Shivam</td>
            <td>History</td>
            <td>88</td>
            <td>A</td>
          </tr>
          <tr>
            <td>Kabir</td>
            <td>Computer</td>
            <td>95</td>
            <td>A+</td>
          </tr>
        </tbody>
      </table>
    </div>
  </body>
</html>
